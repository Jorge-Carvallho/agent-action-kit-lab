name: Demo (tests + docker + cli)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python run_tests.py

      - name: Build and start docker compose
        run: |
          docker compose up -d --build
          mkdir -p demo-report
          docker compose ps | tee demo-report/docker-compose.ps.txt

      - name: Wait for services (health)
        shell: bash
        run: |
          set -euo pipefail

          wait_http() {
            local url="$1"
            local name="$2"
            local deadline=$((SECONDS + 180))

            echo "Waiting for ${name} (${url})..."
            while (( SECONDS < deadline )); do
              if curl -fsS --max-time 2 "$url" >/dev/null; then
                echo "${name} is up."
                return 0
              fi
              sleep 2
            done

            echo "Timed out waiting for ${name} (${url})" >&2
            return 1
          }

          wait_http "http://127.0.0.1:8000/health" "API"
          wait_http "http://127.0.0.1:3100/health" "MCP OCR"
          wait_http "http://127.0.0.1:3200/health" "MCP RAG"

      - name: Health checks
        run: |
          mkdir -p demo-report
          curl -fsS http://127.0.0.1:8000/health | tee demo-report/health-api.json
          echo
          curl -fsS http://127.0.0.1:3100/health | tee demo-report/health-mcp-ocr.json
          echo
          curl -fsS http://127.0.0.1:3200/health | tee demo-report/health-mcp-rag.json
          echo

      - name: Run CLI demo (dry-run)
        shell: bash
        run: |
          set -o pipefail
          python run_lab_cli.py examples/sample_prescription.png --dry-run | tee demo-report/demo-output.txt

      - name: Write GitHub Actions job summary
        if: success()
        shell: bash
        run: |
          {
            echo "## Demo (dry-run) — relatório rápido"
            echo
            echo "- **Workflow**: \`${{ github.workflow }}\`"
            echo "- **Run**: ${{ github.run_id }} (attempt ${{ github.run_attempt }})"
            echo "- **Commit**: \`${{ github.sha }}\`"
            echo "- **Ref**: \`${{ github.ref }}\`"
            echo
            echo "### Health (JSON)"
            echo "\`\`\`json"
            cat demo-report/health-api.json
            echo "\`\`\`"
            echo "\`\`\`json"
            cat demo-report/health-mcp-ocr.json
            echo "\`\`\`"
            echo "\`\`\`json"
            cat demo-report/health-mcp-rag.json
            echo "\`\`\`"
            echo
            echo "### CLI (trecho inicial)"
            echo "\`\`\`text"
            head -n 40 demo-report/demo-output.txt || true
            echo "\`\`\`"
            echo
            echo "### Artifact"
            echo "Baixe **\`demo-report\`** (ZIP) na seção *Artifacts* deste run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload demo report artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: demo-report
          path: demo-report/

      - name: Docker logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs api --tail 200
          docker compose logs mcp-ocr --tail 200
          docker compose logs mcp-rag --tail 200

      - name: Shutdown docker compose
        if: always()
        run: |
          docker compose down
